name: 'greenplum_warehouse'
version: '1.0.0'
config-version: 2

profile: 'greenplum_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  greenplum_warehouse:
    staging:
      +materialized: view
      +tags: ['staging']
    intermediate:
      +materialized: view
      +tags: ['intermediate']
    marts:
      +materialized: table
      +tags: ['marts']
      client_features:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: client_id
